<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>课时达人</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>课时达人</h1>
      <p>手机也能随手记，自动统计每月课时</p>
    </header>

    <div id="toast" class="toast"></div>

    <main>
      <section class="card">
        <h2>新增上课记录</h2>
        <form id="recordForm" class="form-grid simple-form-grid">
          <label>
            日期
            <input type="date" id="date" required />
          </label>

          <label>
            学生姓名（可多选）
            <div class="stack">
              <select id="studentSelect" multiple size="6"></select>
              <div class="inline-row">
                <input type="text" id="newStudentName" placeholder="新学生姓名（可直接新增）" />
                <button type="button" id="addStudentQuickBtn" class="secondary">新增</button>
              </div>
              <small class="helper-text">可按住 Ctrl / Command 多选；手机上可逐个点选。</small>
            </div>
          </label>

          <label>
            课时类型
            <select id="lessonType" required>
              <option value="阶梯课时">阶梯课时</option>
              <option value="陪练课时">陪练课时</option>
            </select>
          </label>

          <div class="hour-choice-block full">
            <span class="choice-label">课时数</span>
            <div class="hour-choice-group" id="hoursChoiceGroup">
              <button type="button" class="hour-choice active" data-hours="1">1课时</button>
              <button type="button" class="hour-choice" data-hours="1.5">1.5课时</button>
              <button type="button" class="hour-choice" data-hours="2">2课时</button>
            </div>
            <input type="hidden" id="hours" value="1" />
          </div>

          <label>
            备注（可不填）
            <input type="text" id="note" placeholder="例如：试听课 / 补课" />
          </label>

          <button type="submit" class="primary full">保存记录</button>
        </form>
      </section>

      <section class="card">
        <button id="toggleStudentManageBtn" type="button" class="collapse-btn">学生管理（点击展开）</button>
        <div id="studentManagePanel" class="student-manage-panel collapsed">
          <div class="section-title top-gap">
            <h2>学生管理</h2>
            <div class="actions">
              <button id="showInactiveBtn" type="button" class="secondary">显示/隐藏已停课</button>
            </div>
          </div>
          <div class="student-manage-grid">
            <div class="inline-row">
              <input type="text" id="manageStudentName" placeholder="输入学生姓名后新增" />
              <button id="addStudentBtn" type="button" class="primary">新增学生</button>
            </div>
            <div class="batch-box">
              <label>
                批量导入学生
                <textarea id="batchStudentNames" rows="8" placeholder="一行一个学生姓名，例如：&#10;赵静&#10;潘昊睿&#10;苏奕瑀"></textarea>
              </label>
              <button id="batchImportBtn" type="button" class="primary">批量导入</button>
            </div>
            <div id="studentList" class="student-list"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <button id="toggleMonthStatsBtn" type="button" class="collapse-btn">本月统计（点击展开）</button>
        <div id="monthStatsPanel" class="month-stats-panel collapsed top-gap">
          <section class="stats-grid three-cols month-stats">
            <div class="card stat">
              <span>本月总课时</span>
              <strong id="monthHours">0</strong>
            </div>
            <div class="card stat">
              <span>本月阶梯课时</span>
              <strong id="monthTierHours">0</strong>
            </div>
            <div class="card stat">
              <span>本月陪练课时</span>
              <strong id="monthShareHours">0</strong>
            </div>
          </section>
        </div>
      </section>

      <section class="card">
        <button id="toggleTotalStatsBtn" type="button" class="collapse-btn">总统计（点击展开）</button>
        <div id="totalStatsPanel" class="total-stats-panel collapsed top-gap">
          <section class="stats-grid four-total-cols">
            <div class="card stat compact-stat">
              <span>总记录数</span>
              <strong id="totalCount">0</strong>
            </div>
            <div class="card stat compact-stat">
              <span>总课时</span>
              <strong id="totalHours">0</strong>
            </div>
            <div class="card stat compact-stat">
              <span>总阶梯课时</span>
              <strong id="tierHours">0</strong>
            </div>
            <div class="card stat compact-stat">
              <span>总陪练课时</span>
              <strong id="shareHours">0</strong>
            </div>
          </section>
        </div>
      </section>

      <section class="card">
        <button id="toggleRecordListBtn" type="button" class="collapse-btn">记录列表（点击展开）</button>
        <div id="recordListPanel" class="record-list-panel collapsed top-gap">
          <div class="section-title">
            <h2>记录列表</h2>
            <div class="actions">
              <button id="exportBtn" type="button" class="secondary">导出CSV</button>
            </div>
          </div>

          <div class="filters four-cols">
            <input type="month" id="monthFilter" />
            <input type="text" id="keywordFilter" placeholder="搜索学生 / 备注" />
            <select id="typeFilter">
              <option value="">全部类型</option>
              <option value="阶梯课时">阶梯课时</option>
              <option value="陪练课时">陪练课时</option>
            </select>
            <select id="studentFilter">
              <option value="">全部学生</option>
            </select>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>学生</th>
                  <th>类型</th>
                  <th>课时</th>
                  <th>备注</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="recordTable"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
